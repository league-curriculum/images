{% extends "page.html" %}
{% from "_card.html" import image_card %}
{% block content %}
<h1>League Image Catalog</h1>
<p class="subtitle">{{ total_images }} images across {{ categories|length }} categories</p>

<div class="image-grid" id="image-grid">
  {% for img in images %}
  {{ image_card(img) }}
  {% endfor %}
</div>
{% endblock %}
