<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} - League Image Catalog</title>
  <style>
    :root {
      --orange: #f26522;
      --orange-light: #fff3eb;
      --dark: #1a1a2e;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --sidebar-w: 240px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--gray-900);
      background: var(--gray-50);
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--dark);
      color: #fff;
      padding: 1rem 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
      z-index: 10;
    }
    .sidebar h1 {
      font-size: .95rem;
      padding: .75rem 1rem;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .sidebar h2 {
      font-size: .7rem;
      padding: .5rem 1rem .25rem;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .sidebar a {
      display: block;
      padding: .35rem 1rem;
      color: var(--gray-300);
      text-decoration: none;
      font-size: .85rem;
      transition: background .15s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,.08);
      color: #fff;
    }
    .sidebar a.active {
      border-left: 3px solid var(--orange);
      padding-left: calc(1rem - 3px);
    }
    .sidebar .flag-btn {
      display: inline-block;
      padding: .2rem .5rem;
      margin: .15rem .15rem .15rem 1rem;
      border-radius: 4px;
      font-size: .75rem;
      cursor: pointer;
      background: rgba(255,255,255,.1);
      color: var(--gray-300);
      text-decoration: none;
      transition: all .15s;
    }
    .sidebar .flag-btn:hover, .sidebar .flag-btn.active {
      background: var(--orange);
      color: #fff;
    }

    /* Main area */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Search bar */
    .search-bar {
      position: sticky;
      top: 0;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: .75rem 1.5rem;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .search-bar input {
      flex: 1;
      padding: .5rem .75rem;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
    }
    .search-bar input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(242,101,34,.15);
    }
    .search-bar .result-count {
      font-size: .8rem;
      color: var(--gray-500);
      white-space: nowrap;
    }

    /* Content */
    .content {
      padding: 1.5rem;
    }
    .content h1 {
      font-size: 1.5rem;
      margin-bottom: .25rem;
    }
    .content .subtitle {
      color: var(--gray-500);
      margin-bottom: 1.5rem;
      font-size: .9rem;
    }

    /* Image grid */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }
    .image-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      overflow: hidden;
      transition: box-shadow .2s;
    }
    .image-card:hover {
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }
    .image-card .thumb {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: contain;
      background: var(--gray-100);
      display: block;
    }
    .image-card .info {
      padding: .75rem;
    }
    .image-card .name {
      font-size: .8rem;
      font-weight: 600;
      word-break: break-all;
      margin-bottom: .35rem;
    }
    .image-card .name a {
      color: var(--gray-900);
      text-decoration: none;
    }
    .image-card .name a:hover {
      color: var(--orange);
    }
    .image-card .desc {
      font-size: .75rem;
      color: var(--gray-500);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .image-card .tags {
      display: flex;
      flex-wrap: wrap;
      gap: .25rem;
      margin-top: .5rem;
    }
    .image-card .tag {
      font-size: .65rem;
      padding: .1rem .4rem;
      border-radius: 3px;
      background: var(--orange-light);
      color: var(--orange);
    }

    /* Index page category cards */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .cat-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      padding: 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow .2s;
    }
    .cat-card:hover {
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }
    .cat-card h3 {
      color: var(--orange);
      margin-bottom: .35rem;
    }
    .cat-card p {
      font-size: .85rem;
      color: var(--gray-500);
      line-height: 1.4;
    }
    .cat-card .count {
      font-size: .8rem;
      color: var(--gray-700);
      margin-top: .5rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <h1>League Images</h1>

  <h2>Categories</h2>
  <a href="index.html" {% if active_category == 'index' %}class="active"{% endif %}>All Categories</a>
  {% for cat in categories %}
  <a href="{{ cat.name }}.html" {% if active_category == cat.name %}class="active"{% endif %}>
    {{ cat.name }} ({{ cat.count }})
  </a>
  {% endfor %}

  <h2>Filter by Flag</h2>
  <div style="padding: 0 0 1rem 0;">
    {% for flag in flags %}
    <span class="flag-btn" data-flag="{{ flag }}">{{ flag }}</span>
    {% endfor %}
  </div>
</nav>

<div class="main">
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search image descriptions..." autocomplete="off">
    <span class="result-count" id="result-count"></span>
  </div>

  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

<script>
const CATALOG_URL = 'data/catalog.json';
let catalog = null;
let activeFlags = new Set();

async function loadCatalog() {
  if (catalog) return catalog;
  const resp = await fetch(CATALOG_URL);
  catalog = await resp.json();
  return catalog;
}

function renderCards(images) {
  const grid = document.getElementById('image-grid');
  if (!grid) return;

  grid.innerHTML = images.map(img => {
    const trueTags = Object.entries(img.flags || {})
      .filter(([,v]) => v)
      .map(([k]) => k);
    const tagHtml = trueTags.map(t => `<span class="tag">${t}</span>`).join('');
    return `
      <div class="image-card" data-desc="${(img.description || '').toLowerCase()}"
           data-flags="${trueTags.join(',')}" data-name="${img.name.toLowerCase()}">
        <img class="thumb" src="${img.path}" alt="${img.name}" loading="lazy">
        <div class="info">
          <div class="name"><a href="${img.path}" target="_blank">${img.name}</a></div>
          <div class="desc">${img.description || ''}</div>
          <div class="tags">${tagHtml}</div>
        </div>
      </div>`;
  }).join('');
}

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const cards = document.querySelectorAll('.image-card');
  let shown = 0;

  cards.forEach(card => {
    const desc = card.dataset.desc || '';
    const name = card.dataset.name || '';
    const cardFlags = card.dataset.flags ? card.dataset.flags.split(',') : [];

    let matchText = !query || desc.includes(query) || name.includes(query);
    let matchFlags = activeFlags.size === 0 || [...activeFlags].every(f => cardFlags.includes(f));

    if (matchText && matchFlags) {
      card.style.display = '';
      shown++;
    } else {
      card.style.display = 'none';
    }
  });

  const total = cards.length;
  const counter = document.getElementById('result-count');
  if (query || activeFlags.size > 0) {
    counter.textContent = `${shown} / ${total}`;
  } else {
    counter.textContent = `${total} images`;
  }
}

document.getElementById('search').addEventListener('input', applyFilters);

document.querySelectorAll('.flag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const flag = btn.dataset.flag;
    if (activeFlags.has(flag)) {
      activeFlags.delete(flag);
      btn.classList.remove('active');
    } else {
      activeFlags.add(flag);
      btn.classList.add('active');
    }
    applyFilters();
  });
});

// Initialize count on page load
document.addEventListener('DOMContentLoaded', () => {
  const cards = document.querySelectorAll('.image-card');
  const counter = document.getElementById('result-count');
  if (counter && cards.length) {
    counter.textContent = `${cards.length} images`;
  }
});
</script>

</body>
</html>
