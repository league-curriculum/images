{% extends "page.html" %}
{% from "_card.html" import image_card %}
{% block content %}
<h1>Flag: {{ flag_name }}</h1>
<p class="subtitle">{{ images|length }} images with this flag</p>

<div class="image-grid" id="image-grid">
  {% for img in images %}
  {{ image_card(img) }}
  {% endfor %}
</div>
{% endblock %}
