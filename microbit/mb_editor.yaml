description: A screenshot of the Microsoft MakeCode interface for micro:bit programming.
  The screen shows the Blocks editor with a micro:bit device visualization on the
  left displaying LED patterns, and a color-coded menu of programming blocks (Basic,
  Input, Music, Led, Radio, Loops, Logic, Variables, Math, Extensions, Advanced) on
  the left. The main coding area on the right shows a 'forever' loop with 'show icon'
  blocks.
